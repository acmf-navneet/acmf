services:
  postgres:
    image: postgres:16-alpine
    container_name: acmf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../acmf-api
      dockerfile: docker/Dockerfile
    container_name: acmf-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      FRONTEND_URLS: ${FRONTEND_URLS}
      # Keep container path and host path mapping explicit for Docker-in-Docker generation.
      INTERNAL_ROOT_PATH: /app/generated-projects
      HOST_ROOT_PATH: /home/ubuntu/generated-projects
    expose:
      - "8081"
    # The API generates JHipster projects by invoking `docker run`.
    # Mount the host Docker socket so the API container can talk to the host daemon.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/generated-projects:/app/generated-projects

  ui:
    build:
      context: ../acmf-ui
      dockerfile: Dockerfile
      args:
        # Use same-origin calls:
        # - axios calls like "/api/projects" become "/api/projects"
        # - auth calls like "/auth/login" become "/auth/login"
        VITE_API_URL: ""
    container_name: acmf-ui
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
