name: Deploy ACMF UI+API to EC2

on:
  push:
    branches: ["main"]
    paths:
      - "acmf-ui/**"
      - "acmf-api/**"
      - "deploy/**"
      - ".github/workflows/deploy-ec2.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.EC2_SSH_PORT }}" "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to EC2
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "**/node_modules" \
            --exclude "**/target" \
            -e "ssh -p ${{ secrets.EC2_SSH_PORT }}" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}/"

      - name: Create deploy env file on EC2
        run: |
          ssh -p "${{ secrets.EC2_SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
          "cat > '${{ secrets.EC2_APP_DIR }}/deploy/.env.ec2' << 'EOF'
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          FRONTEND_URLS=http://${{ secrets.EC2_PUBLIC_IP }}
          EOF"

      - name: Deploy with Docker Compose
        run: |
          ssh -p "${{ secrets.EC2_SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
          "cd '${{ secrets.EC2_APP_DIR }}/deploy' && docker compose --env-file .env.ec2 -f docker-compose.ec2.yml up -d --build && docker compose --env-file .env.ec2 -f docker-compose.ec2.yml ps"
